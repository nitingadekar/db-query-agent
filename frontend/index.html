<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Query Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 1rem 2rem; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 1rem; }
        header h1 { font-size: 1.25rem; font-weight: 600; }
        .badge { background: #059669; color: white; font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; }
        main { flex: 1; display: flex; flex-direction: column; max-width: 900px; width: 100%; margin: 0 auto; padding: 2rem; }
        .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding-bottom: 1rem; }
        .message { padding: 1rem; border-radius: 8px; max-width: 85%; white-space: pre-wrap; word-wrap: break-word; font-size: 0.9rem; line-height: 1.5; }
        .message.user { background: #1e40af; align-self: flex-end; }
        .message.agent { background: #1e293b; align-self: flex-start; border: 1px solid #334155; }
        .message.error { background: #7f1d1d; border: 1px solid #991b1b; }
        .data-block { background: #020617; border: 1px solid #334155; border-radius: 4px; padding: 0.75rem; margin-top: 0.5rem; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        .input-area { display: flex; gap: 0.5rem; padding-top: 1rem; border-top: 1px solid #1e293b; }
        .input-area input { flex: 1; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 0.9rem; }
        .input-area input:focus { outline: none; border-color: #3b82f6; }
        .input-area select { padding: 0.75rem; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; }
        .input-area button { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; background: #2563eb; color: white; font-weight: 500; cursor: pointer; }
        .input-area button:hover { background: #1d4ed8; }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { display: inline-block; width: 1rem; height: 1rem; border: 2px solid #475569; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <h1>🗄️ DB Query Agent</h1>
        <span class="badge">Claude + Bedrock</span>
    </header>
    <main>
        <div class="messages" id="messages">
            <div class="message agent">Hello! I can help you query your database using natural language. Ask me anything about your data.</div>
        </div>
        <div class="input-area">
            <input type="text" id="prompt" placeholder="Ask about your data..." autofocus>
            <select id="format">
                <option value="json">JSON</option>
                <option value="table">Table</option>
                <option value="csv">CSV</option>
                <option value="summary">Summary</option>
            </select>
            <button id="send" onclick="sendQuery()">Send</button>
        </div>
    </main>
    <script>
        const messagesEl = document.getElementById('messages');
        const promptEl = document.getElementById('prompt');
        const formatEl = document.getElementById('format');
        const sendBtn = document.getElementById('send');

        promptEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendQuery(); });

        async function sendQuery() {
            const prompt = promptEl.value.trim();
            if (!prompt) return;

            addMessage(prompt, 'user');
            promptEl.value = '';
            sendBtn.disabled = true;

            const loadingEl = addMessage('<span class="loading"></span> Thinking...', 'agent');

            try {
                const res = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, format: formatEl.value }),
                });

                messagesEl.removeChild(loadingEl);

                if (!res.ok) {
                    const err = await res.json();
                    addMessage(`Error: ${err.detail || res.statusText}`, 'error');
                    return;
                }

                const data = await res.json();
                let content = data.answer;
                if (data.formatted_data) {
                    content += `\n<div class="data-block">${escapeHtml(data.formatted_data)}</div>`;
                }
                addMessage(content, 'agent');
            } catch (e) {
                messagesEl.removeChild(loadingEl);
                addMessage(`Connection error: ${e.message}`, 'error');
            } finally {
                sendBtn.disabled = false;
                promptEl.focus();
            }
        }

        function addMessage(content, type) {
            const el = document.createElement('div');
            el.className = `message ${type}`;
            el.innerHTML = content;
            messagesEl.appendChild(el);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return el;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
